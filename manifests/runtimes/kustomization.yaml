apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

sortOptions:
  order: legacy

configMapGenerator:
- name: runtimes-config
  envs:
    - params.env

configurations:
- params.yaml

replacements:
# torch-distributed (floating CUDA)
- source:
    kind: ConfigMap
    name: runtimes-config
    version: v1
    fieldPath: data.odh-th06-cuda130-torch210-py312-image
  targets:
  - select:
      kind: ClusterTrainingRuntime
      name: torch-distributed
    fieldPaths:
    - spec.template.spec.replicatedJobs.[name=node].template.spec.template.spec.containers.[name=node].image

